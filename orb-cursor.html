<style>
  #orb-cursor-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  #orb-cursor-container .orb {
    position: fixed;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    background: radial-gradient(
      circle at center,
      rgba(139, 92, 246, 0.85) 0%,
      rgba(59, 130, 246, 0.6) 25%,
      rgba(6, 182, 212, 0.35) 55%,
      rgba(0, 0, 0, 0) 100%
    );
    filter: blur(45px);
    mix-blend-mode: screen;
    opacity: 0.85;
    will-change: transform, width, height, opacity;
    transition: width 0.3s ease, height 0.3s ease, opacity 0.15s ease;
  }

  #orb-cursor-container .orb.orb--hover {
    width: 220px;
    height: 220px;
    background: radial-gradient(
      circle at center,
      rgba(139, 92, 246, 0.85) 0%,
      rgba(59, 130, 246, 0.6) 25%,
      rgba(236, 72, 153, 0.5) 30%,
      rgba(6, 182, 212, 0.35) 55%,
      rgba(0, 0, 0, 0) 100%
    );
  }

  #orb-cursor-container .orb.orb--click {
    transform: translate(-50%, -50%) scale(0.75);
    opacity: 0.95;
    transition: transform 0.15s ease-out, opacity 0.15s ease-out, width 0.3s ease, height 0.3s ease;
  }

  #orb-cursor-container .orb.orb--breathing {
    animation: orb-breathe 2s ease-in-out infinite alternate;
  }

  @keyframes orb-breathe {
    0%   { transform: translate(-50%, -50%) scale(1); }
    100% { transform: translate(-50%, -50%) scale(1.08); }
  }

  /* Mobile ambient mode */
  #orb-cursor-container .orb.orb--mobile {
    left: 50vw !important;
    top: 50vh !important;
    opacity: 0.5;
    width: min(180px, 45vw);
    height: min(180px, 45vw);
    animation: orb-mobile-float 3s ease-in-out infinite alternate;
  }

  @keyframes orb-mobile-float {
    0%   { transform: translate(-50%, -50%) scale(0.9); }
    100% { transform: translate(-50%, -50%) scale(1.1); }
  }
</style>

<div id="orb-cursor-container">
  <div class="orb" id="orb-cursor-element"></div>
</div>

<script>
  (function () {
    'use strict';

    const orb = document.getElementById('orb-cursor-element');
    if (!orb) return;

    const isTouchDevice =
      window.matchMedia('(hover: none)').matches || 'ontouchstart' in window;

    if (isTouchDevice) {
      // ── Mobile: static ambient orb ──
      orb.classList.add('orb--mobile');
      console.log('✅ ORB Cursor Initialized (mobile ambient mode)');
      return;
    }

    // ── Desktop: cursor-following orb ──
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let orbX = mouseX;
    let orbY = mouseY;
    const LERP = 0.18;

    let idleTimer = null;
    let isIdle = false;
    let isHovering = false;

    // Position the orb at center initially
    orb.style.left = orbX + 'px';
    orb.style.top = orbY + 'px';

    // ── Mouse tracking ──
    function onMouseMove(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;

      // Reset idle
      if (isIdle) {
        isIdle = false;
        orb.classList.remove('orb--breathing');
      }
      clearTimeout(idleTimer);
      idleTimer = setTimeout(function () {
        isIdle = true;
        if (!orb.classList.contains('orb--click')) {
          orb.classList.add('orb--breathing');
        }
      }, 2000);
    }

    document.addEventListener('mousemove', onMouseMove, { passive: true });

    // ── Animation loop ──
    function animate() {
      orbX += (mouseX - orbX) * LERP;
      orbY += (mouseY - orbY) * LERP;
      orb.style.left = orbX + 'px';
      orb.style.top = orbY + 'px';
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── Click ripple ──
    document.addEventListener('mousedown', function () {
      orb.classList.remove('orb--breathing');
      orb.classList.add('orb--click');
    });

    document.addEventListener('mouseup', function () {
      setTimeout(function () {
        orb.classList.remove('orb--click');
      }, 150);
    });

    // ── Hover detection on interactive elements ──
    document.addEventListener(
      'mouseover',
      function (e) {
        const target = e.target.closest('a, button, [role="button"]');
        if (target && !isHovering) {
          isHovering = true;
          orb.classList.add('orb--hover');
        }
      },
      { passive: true }
    );

    document.addEventListener(
      'mouseout',
      function (e) {
        const target = e.target.closest('a, button, [role="button"]');
        if (target && isHovering) {
          // Make sure we're actually leaving the interactive element
          const related = e.relatedTarget;
          if (!related || !related.closest('a, button, [role="button"]')) {
            isHovering = false;
            orb.classList.remove('orb--hover');
          }
        }
      },
      { passive: true }
    );

    console.log('✅ ORB Cursor Initialized');
  })();
</script>
